<h1>What is DNS?</h1>
</header>

<main>

<p>DNS stands for Domain Name System. It translates domain names into IP addresses.</p>

<h2>How DNS works</h2>
<p>When you type a website address, DNS finds the server where the website is hosted.</p>

<h2>Why DNS is important</h2>
<p>Without DNS, users would need to remember numeric IP addresses.</p>
