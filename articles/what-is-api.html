<h1>What is an API?</h1>
</header>

<main>

<p>An API (Application Programming Interface) allows different software systems to communicate.</p>

<h2>How APIs work</h2>
<p>They provide a set of rules that developers follow to exchange data.</p>

<h2>Where APIs are used</h2>
<p>APIs power integrations between websites, apps and services.</p>
