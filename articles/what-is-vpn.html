<h1>What is VPN?</h1>
</header>

<main>

<p>A VPN is a Virtual Private Network that encrypts internet traffic.</p>

<h2>Why people use VPN</h2>
<p>VPNs improve privacy and protect data on public networks.</p>

<h2>How VPN works</h2>
<p>It routes your internet connection through a secure server.</p>
