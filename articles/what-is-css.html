<h1>What is CSS?</h1>
</header>

<main>

<p>CSS stands for Cascading Style Sheets. It is used to style and design web pages.</p>

<h2>How CSS works</h2>
<p>CSS controls colors, layout, fonts and spacing on websites.</p>

<h2>Why CSS is important</h2>
<p>Without CSS, websites would appear as plain text with no design.</p>
